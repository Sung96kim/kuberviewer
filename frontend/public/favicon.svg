<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="spoke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Kubernetes helm wheel - 7 spokes -->
  <g transform="translate(256,256)" fill="none" stroke="url(#spoke)" stroke-width="28" stroke-linecap="round">
    <!-- Spokes -->
    <line x1="0" y1="-70" x2="0" y2="-155"/>
    <line x1="0" y1="-70" x2="0" y2="-155" transform="rotate(51.43)"/>
    <line x1="0" y1="-70" x2="0" y2="-155" transform="rotate(102.86)"/>
    <line x1="0" y1="-70" x2="0" y2="-155" transform="rotate(154.29)"/>
    <line x1="0" y1="-70" x2="0" y2="-155" transform="rotate(205.71)"/>
    <line x1="0" y1="-70" x2="0" y2="-155" transform="rotate(257.14)"/>
    <line x1="0" y1="-70" x2="0" y2="-155" transform="rotate(308.57)"/>
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="155" stroke-width="30"/>
    <!-- Inner hub -->
    <circle cx="0" cy="0" r="50" fill="#e0e7ff" stroke="none"/>
  </g>
  <!-- Eye/viewer overlay - subtle lens -->
  <g transform="translate(256,256)">
    <ellipse cx="0" cy="0" rx="90" ry="55" fill="none" stroke="#0f172a" stroke-width="16" opacity="0.5"/>
    <circle cx="0" cy="0" r="28" fill="#0f172a" opacity="0.5"/>
    <circle cx="-8" cy="-8" r="8" fill="#e0e7ff" opacity="0.6"/>
  </g>
</svg>
